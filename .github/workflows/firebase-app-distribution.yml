name: Android CI and Firebase App Distribution

on:
  pull_request:
    paths:
      - .github/workflows/firebase-app-distribution.yml
      - androidApp/**
      - shared/**
      - gradle/**
      - build.gradle.kts
      - settings.gradle.kts
      - gradle.properties
      - gradlew
      - gradlew.bat
  push:
    branches:
      - experiment
    paths:
      - .github/workflows/firebase-app-distribution.yml
      - androidApp/**
      - shared/**
      - gradle/**
      - build.gradle.kts
      - settings.gradle.kts
      - gradle.properties
      - gradlew
      - gradlew.bat
  workflow_dispatch:
    inputs:
      build_variant:
        description: Build variant to verify and distribute
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release
      artifact_type:
        description: Android artifact to build and upload
        required: true
        default: APK
        type: choice
        options:
          - APK
          - AAB

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.build_variant || 'debug' }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_variant: ${{ steps.config.outputs.build_variant }}
      variant_cap: ${{ steps.config.outputs.variant_cap }}
      artifact_type: ${{ steps.config.outputs.artifact_type }}
      build_task: ${{ steps.config.outputs.build_task }}
      upload_task: ${{ steps.config.outputs.upload_task }}
      artifact_glob: ${{ steps.config.outputs.artifact_glob }}
      distribution_artifact_name: ${{ steps.config.outputs.distribution_artifact_name }}
      reports_artifact_name: ${{ steps.config.outputs.reports_artifact_name }}
      ui_reports_artifact_name: ${{ steps.config.outputs.ui_reports_artifact_name }}
      shared_unit_test_task: ${{ steps.config.outputs.shared_unit_test_task }}
      app_unit_test_task: ${{ steps.config.outputs.app_unit_test_task }}
      shared_lint_task: ${{ steps.config.outputs.shared_lint_task }}
      app_lint_task: ${{ steps.config.outputs.app_lint_task }}
    steps:
      - name: Resolve pipeline configuration
        id: config
        shell: bash
        run: |
          build_variant="${{ github.event_name == 'workflow_dispatch' && inputs.build_variant || 'debug' }}"
          artifact_type="${{ github.event_name == 'workflow_dispatch' && inputs.artifact_type || 'APK' }}"
          variant_cap="${build_variant^}"
          artifact_type_upper="${artifact_type^^}"
          artifact_type_lower="${artifact_type,,}"

          if [ "$artifact_type_upper" = "AAB" ]; then
            build_task="bundle${variant_cap}"
            artifact_glob="androidApp/build/outputs/bundle/${build_variant}/*.aab"
          else
            build_task="assemble${variant_cap}"
            artifact_glob="androidApp/build/outputs/apk/${build_variant}/*.apk"
          fi

          echo "build_variant=$build_variant" >> "$GITHUB_OUTPUT"
          echo "variant_cap=$variant_cap" >> "$GITHUB_OUTPUT"
          echo "artifact_type=$artifact_type_upper" >> "$GITHUB_OUTPUT"
          echo "build_task=$build_task" >> "$GITHUB_OUTPUT"
          echo "upload_task=appDistributionUpload${variant_cap}" >> "$GITHUB_OUTPUT"
          echo "artifact_glob=$artifact_glob" >> "$GITHUB_OUTPUT"
          echo "distribution_artifact_name=android-${build_variant}-${artifact_type_lower}" >> "$GITHUB_OUTPUT"
          echo "reports_artifact_name=android-verification-reports-${build_variant}" >> "$GITHUB_OUTPUT"
          echo "ui_reports_artifact_name=android-ui-test-reports-${build_variant}" >> "$GITHUB_OUTPUT"
          echo "shared_unit_test_task=:shared:test${variant_cap}UnitTest" >> "$GITHUB_OUTPUT"
          echo "app_unit_test_task=:androidApp:test${variant_cap}UnitTest" >> "$GITHUB_OUTPUT"
          echo "shared_lint_task=:shared:lint${variant_cap}" >> "$GITHUB_OUTPUT"
          echo "app_lint_task=:androidApp:lint${variant_cap}" >> "$GITHUB_OUTPUT"

  verify-android:
    name: Verify Android
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      BUILD_VARIANT: ${{ needs.prepare.outputs.build_variant }}
      BUILD_TASK: ${{ needs.prepare.outputs.build_task }}
      SHARED_UNIT_TEST_TASK: ${{ needs.prepare.outputs.shared_unit_test_task }}
      APP_UNIT_TEST_TASK: ${{ needs.prepare.outputs.app_unit_test_task }}
      SHARED_LINT_TASK: ${{ needs.prepare.outputs.shared_lint_task }}
      APP_LINT_TASK: ${{ needs.prepare.outputs.app_lint_task }}
      ARTIFACT_GLOB: ${{ needs.prepare.outputs.artifact_glob }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Prepare release signing
        if: env.BUILD_VARIANT == 'release'
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_RELEASE_KEYSTORE_BASE64" ] || [ -z "$ANDROID_RELEASE_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_RELEASE_KEY_ALIAS" ] || [ -z "$ANDROID_RELEASE_KEY_PASSWORD" ]; then
            echo "Release verification requires all ANDROID_RELEASE_* secrets." >&2
            exit 1
          fi

          keystore_path="$RUNNER_TEMP/release-keystore.jks"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"

          echo "ANDROID_RELEASE_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"
          echo "ANDROID_RELEASE_KEYSTORE_PASSWORD=$ANDROID_RELEASE_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_RELEASE_KEY_ALIAS=$ANDROID_RELEASE_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_RELEASE_KEY_PASSWORD=$ANDROID_RELEASE_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Run unit tests, lint, and build
        run: |
          ./gradlew \
            "$SHARED_UNIT_TEST_TASK" \
            "$APP_UNIT_TEST_TASK" \
            "$SHARED_LINT_TASK" \
            "$APP_LINT_TASK" \
            "$BUILD_TASK"

      - name: Resolve built artifact
        id: artifact
        shell: bash
        run: |
          shopt -s nullglob
          files=( $ARTIFACT_GLOB )
          if [ "${#files[@]}" -ne 1 ]; then
            echo "Expected exactly one distribution artifact, found ${#files[@]}." >&2
            printf '%s\n' "${files[@]}" >&2
            exit 1
          fi

          echo "path=${files[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.reports_artifact_name }}
          path: |
            androidApp/build/reports/**
            shared/build/reports/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload distribution artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.distribution_artifact_name }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  ui-tests-android:
    name: Android UI Tests
    needs:
      - prepare
      - verify-android
    if: needs.prepare.outputs.build_variant == 'debug'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run connected Debug Android tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-boot-timeout: 600
          script: ./gradlew :androidApp:connectedDebugAndroidTest

      - name: Upload UI test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.ui_reports_artifact_name }}
          path: |
            androidApp/build/reports/androidTests/**
            androidApp/build/outputs/androidTest-results/**
          if-no-files-found: warn
          retention-days: 14

  distribute-android:
    name: Distribute to Firebase
    needs:
      - prepare
      - verify-android
      - ui-tests-android
    if: >-
      github.event_name != 'pull_request' &&
      needs.verify-android.result == 'success' &&
      (
        needs.prepare.outputs.build_variant != 'debug' ||
        needs.ui-tests-android.result == 'success'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      BUILD_VARIANT: ${{ needs.prepare.outputs.build_variant }}
      VARIANT_CAP: ${{ needs.prepare.outputs.variant_cap }}
      FIREBASE_APP_DIST_ARTIFACT_TYPE: ${{ needs.prepare.outputs.artifact_type }}
      FIREBASE_APP_DIST_GROUPS: ${{ secrets.FIREBASE_APP_DIST_GROUPS }}
      FIREBASE_APP_DIST_TESTERS: ${{ secrets.FIREBASE_APP_DIST_TESTERS }}
      UPLOAD_TASK: ${{ needs.prepare.outputs.upload_task }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          create_credentials_file: true
          export_environment_variables: true
          cleanup_credentials: true
          request_reason: GitHubActions:${{ github.repository }}:${{ github.workflow }}:${{ github.run_id }}

      - name: Validate tester target
        run: |
          if [ -z "$FIREBASE_APP_DIST_GROUPS" ] && [ -z "$FIREBASE_APP_DIST_TESTERS" ]; then
            echo "Set FIREBASE_APP_DIST_GROUPS or FIREBASE_APP_DIST_TESTERS in GitHub Secrets." >&2
            exit 1
          fi

      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.distribution_artifact_name }}
          path: distribution-artifact

      - name: Resolve Firebase App ID
        shell: bash
        run: |
          firebase_app_id="$(
            ruby -rjson -e '
              json = JSON.parse(File.read("androidApp/google-services.json"))
              client = json.fetch("client").find do |entry|
                entry.dig("client_info", "android_client_info", "package_name") == "com.erkan.experimentkmp.android"
              end
              abort("No matching Firebase client for com.erkan.experimentkmp.android") unless client
              puts client.fetch("client_info").fetch("mobilesdk_app_id")
            '
          )"

          echo "FIREBASE_APP_ID=$firebase_app_id" >> "$GITHUB_ENV"

      - name: Resolve downloaded artifact
        id: downloaded-artifact
        shell: bash
        run: |
          shopt -s nullglob
          files=( distribution-artifact/* )
          if [ "${#files[@]}" -ne 1 ]; then
            echo "Expected exactly one downloaded artifact, found ${#files[@]}." >&2
            printf '%s\n' "${files[@]}" >&2
            exit 1
          fi

          echo "path=${files[0]}" >> "$GITHUB_OUTPUT"

      - name: Create Firebase release notes
        run: |
          notes_path="$RUNNER_TEMP/firebase-release-notes.txt"
          {
            echo "Repository: ${{ github.repository }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
            echo "Actor: ${{ github.actor }}"
            echo "Workflow: ${{ github.workflow }}"
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            git log -1 --pretty=%B
          } > "$notes_path"

          echo "FIREBASE_APP_DIST_RELEASE_NOTES_FILE=$notes_path" >> "$GITHUB_ENV"

      - name: Upload to Firebase App Distribution
        run: |
          ./gradlew \
            "$UPLOAD_TASK" \
            "--artifactType=$FIREBASE_APP_DIST_ARTIFACT_TYPE" \
            "--artifactPath=${{ steps.downloaded-artifact.outputs.path }}" \
            "--releaseNotesFile=$FIREBASE_APP_DIST_RELEASE_NOTES_FILE"
