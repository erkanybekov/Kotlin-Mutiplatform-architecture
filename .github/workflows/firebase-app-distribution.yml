name: Android Firebase App Distribution

on:
  push:
    branches:
      - master-multiplatform
  workflow_dispatch:
    inputs:
      build_variant:
        description: Build variant to distribute
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release
      artifact_type:
        description: Android artifact to upload to Firebase
        required: true
        default: APK
        type: choice
        options:
          - APK
          - AAB

permissions:
  contents: read

concurrency:
  group: firebase-app-distribution-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.build_variant || 'debug' }}
  cancel-in-progress: true

jobs:
  distribute-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BUILD_VARIANT: ${{ github.event_name == 'workflow_dispatch' && inputs.build_variant || 'debug' }}
      FIREBASE_APP_DIST_ARTIFACT_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.artifact_type || 'APK' }}
      FIREBASE_APP_DIST_GROUPS: ${{ secrets.FIREBASE_APP_DIST_GROUPS }}
      FIREBASE_APP_DIST_TESTERS: ${{ secrets.FIREBASE_APP_DIST_TESTERS }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Prepare Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_JSON secret is required." >&2
            exit 1
          fi

          credentials_path="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$credentials_path"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$credentials_path" >> "$GITHUB_ENV"

      - name: Validate tester target
        run: |
          if [ -z "$FIREBASE_APP_DIST_GROUPS" ] && [ -z "$FIREBASE_APP_DIST_TESTERS" ]; then
            echo "Set FIREBASE_APP_DIST_GROUPS or FIREBASE_APP_DIST_TESTERS in GitHub Secrets." >&2
            exit 1
          fi

      - name: Prepare release signing
        if: env.BUILD_VARIANT == 'release'
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_RELEASE_KEYSTORE_BASE64" ] || [ -z "$ANDROID_RELEASE_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_RELEASE_KEY_ALIAS" ] || [ -z "$ANDROID_RELEASE_KEY_PASSWORD" ]; then
            echo "Release distribution requires all ANDROID_RELEASE_* secrets." >&2
            exit 1
          fi

          keystore_path="$RUNNER_TEMP/release-keystore.jks"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"

          echo "ANDROID_RELEASE_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"
          echo "ANDROID_RELEASE_KEYSTORE_PASSWORD=$ANDROID_RELEASE_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_RELEASE_KEY_ALIAS=$ANDROID_RELEASE_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_RELEASE_KEY_PASSWORD=$ANDROID_RELEASE_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Create Firebase release notes
        run: |
          notes_path="$RUNNER_TEMP/firebase-release-notes.txt"
          {
            echo "Repository: ${{ github.repository }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
            echo "Actor: ${{ github.actor }}"
            echo "Workflow: ${{ github.workflow }}"
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            git log -1 --pretty=%B
          } > "$notes_path"

          echo "FIREBASE_APP_DIST_RELEASE_NOTES_FILE=$notes_path" >> "$GITHUB_ENV"

      - name: Build and distribute
        run: |
          variant_cap="${BUILD_VARIANT^}"
          if [ "$FIREBASE_APP_DIST_ARTIFACT_TYPE" = "AAB" ]; then
            build_task="bundle${variant_cap}"
          else
            build_task="assemble${variant_cap}"
          fi

          ./gradlew "$build_task" "appDistributionUpload${variant_cap}"
